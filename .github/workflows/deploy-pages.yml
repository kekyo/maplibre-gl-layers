name: Deploy Demo to GitHub Pages

on: [push]

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      on_main: ${{ steps.check_on_main.outputs.on_main }}
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if commit is on origin/main
        id: check_on_main
        run: |
          set -euo pipefail
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            if git merge-base --is-ancestor HEAD origin/main; then
              echo "on_main=true" >> "$GITHUB_OUTPUT"
            else
              echo "on_main=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Capture Node binary path
        run: |
          set -euo pipefail
          HOST_NODE_BIN="$(dirname "$(which node)")"
          echo "HOST_NODE_BIN=${HOST_NODE_BIN}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm install

      - name: Build demo workspace
        run: |
          set -euo pipefail
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    needs: build
    if: startsWith( github.ref, 'refs/tags/' ) && needs.build.outputs.on_main == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
